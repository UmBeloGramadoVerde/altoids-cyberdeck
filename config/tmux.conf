set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,tmux-256color:RGB,screen-256color:RGB"
set -g history-limit 10000
set -g mouse on
set -g status off
set -g escape-time 0
set -g base-index 1
set -g renumber-windows on

# Prefix-free navigation for routine window and pane movement.
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9
bind -n M-0 select-window -t :=10
bind -n S-Left previous-window
bind -n S-Right next-window
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Keep destructive actions explicit and confirmed.
bind c new-window
bind & confirm-before -p "Kill window #W? (y/n)" kill-window
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm' 'display-message "TPM not installed; skipping tmux plugin bootstrap"'
